# Events data structure
events:
  - name: Community Over Code Glasgow 2026 # REQUIRED
    ref: glasgow-2026 # REQUIRED Must be unique - Used for matching event data in events page templates.
    nav: nav-glasgow-2026.html
    href: /events/glasgow-2026
    registrationHref: /events/glasgow-2026/register # optional registration link
    startDate: 2026-10-11 # REQUIRED: must use format YYYY-MM-DD
    endDate: 2026-10-14 # REQUIRED: must use format YYYY-MM-DD - used for sorting events 
    displayDate: October 11-14, 2026 # what is displayed on event card
    year: 2026 # optional year event takes place
    location: Glasgow # optional location for event card
    image:  /images/events/event-hero-glasgow.webp # optional image for event card
    colocatedEvents:
      - name: Lakehouse Day
        href: /events/glasgow-2026/lakehouse-day-glasgow
        endDate: 2026-10-11 # must use format YYYY-MM-DD
        displayDate: October 11, 2026 # what is displayed on event card
        image: /images/events/event-hero-glasgow.webp # optional image for event card
      - name: Airflow Contributor Days Glasgow
        href: /events/glasgow-2026/airflow-contributor-days-glasgow
        endDate: 2026-10-11 # must use format YYYY-MM-DD
        displayDate: October 11 - 14, 2026 # what is displayed on event card
        image:  # optional image for event card
    gallery: # optional gallery of images for event landing page
      - /images/events/glasgow-2026/glasgow-gallery-2.webp
      - /images/events/glasgow-2026/glasgow-gallery-1.webp
      - /images/events/glasgow-2026/glasgow-gallery-3.webp
      - /images/events/glasgow-2026/glasgow-gallery-4.webp
      - /images/events/glasgow-2026/glasgow-gallery-5.webp
