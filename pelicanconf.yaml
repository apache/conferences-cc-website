site:
  name: Community Over Code
  description: Community Over Code is a website about the people who make up the Apache Software Foundation, and the events that bring them together. 
  domain: communityovercode.apache.org/
  logo: images/logo.png
  repository: https://github.com/apache/conferences-cc-website/blob/main/content/
  trademarks: Apache, the Apache logo are trademarks
  index: '**'

theme: theme/apache

plugins:
  use:
    - gfm
    - asfindex
    - consensual_youtube

setup:
  data: asfdata.yaml
  run:
    - /bin/bash get_calendar.sh
  postrun:
    - /bin/bash pagefind.sh
  ignore:
    - README.md
    - interviews
    - include
    - '*.odt'

genid:
  unsafe: yes
  metadata: yes
  elements: yes
  headings_depth: 1
  permalinks: no
  toc_depth: 4
  tables: yes

